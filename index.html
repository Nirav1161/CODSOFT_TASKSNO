<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Task Manager</h1>

  <div class="form">
    <input type="text" id="taskInput" placeholder="Enter task...">
    <input type="date" id="dueDate">
    
    <select id="category">
      <option value="General">General</option>
      <option value="Work">Work</option>
      <option value="Study">Study</option>
    </select>

    <select id="priority">
      <option value="Low">Low</option>
      <option value="Medium">Medium</option>
      <option value="High">High</option>
    </select>

    <button onclick="addTask()">Add Task</button>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search..." onkeyup="renderTasks()">
    
    <select id="filter" onchange="renderTasks()">
      <option value="all">All</option>
      <option value="completed">Completed</option>
      <option value="pending">Pending</option>
    </select>
  </div>

  <div id="taskList"></div>

  <div class="stats">
    Completed: <span id="completedCount">0</span> |
    Pending: <span id="pendingCount">0</span>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function addTask() {
    let text = document.getElementById("taskInput").value.trim();
    let due = document.getElementById("dueDate").value;
    let category = document.getElementById("category").value;
    let priority = document.getElementById("priority").value;

    if (text === "") {
      alert("Task cannot be empty!");
      return;
    }

    tasks.push({
      id: Date.now(),
      text,
      due,
      category,
      priority,
      completed: false
    });

    saveTasks();
    document.getElementById("taskInput").value = "";
    renderTasks();
  }

  function deleteTask(id) {
    tasks = tasks.filter(task => task.id !== id);
    saveTasks();
    renderTasks();
  }

  function toggleTask(id) {
    tasks = tasks.map(task =>
      task.id === id ? { ...task, completed: !task.completed } : task
    );
    saveTasks();
    renderTasks();
  }

  function editTask(id) {
    let newText = prompt("Edit task:");
    if (newText) {
      tasks = tasks.map(task =>
        task.id === id ? { ...task, text: newText } : task
      );
      saveTasks();
      renderTasks();
    }
  }

  function renderTasks() {
    let list = document.getElementById("taskList");
    let search = document.getElementById("search").value.toLowerCase();
    let filter = document.getElementById("filter").value;

    list.innerHTML = "";

    let filtered = tasks.filter(task => {
      let matchSearch = task.text.toLowerCase().includes(search);
      let matchFilter =
        filter === "all" ||
        (filter === "completed" && task.completed) ||
        (filter === "pending" && !task.completed);

      return matchSearch && matchFilter;
    });

    let completed = 0;

    filtered.forEach(task => {
      if (task.completed) completed++;

      let div = document.createElement("div");
      div.className = "task " + (task.completed ? "completed" : "");

      div.innerHTML = `
        <span>
          ${task.text} <br>
          <small>${task.category} | ${task.priority} | ${task.due || "No date"}</small>
        </span>
        <div class="actions">
          <button onclick="toggleTask(${task.id})">✔</button>
          <button onclick="editTask(${task.id})">✏</button>
          <button class="delete" onclick="deleteTask(${task.id})">🗑</button>
        </div>
      `;

      list.appendChild(div);
    });

    document.getElementById("completedCount").innerText = tasks.filter(t => t.completed).length;
    document.getElementById("pendingCount").innerText = tasks.filter(t => !t.completed).length;
  }

  function toggleDark() {
    document.body.classList.toggle("dark");
  }

  renderTasks();
</script>

</body>
</html>
